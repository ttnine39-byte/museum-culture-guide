<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서울 미술관 실시간 전시 가이드</title>
    <!-- 네이버 지도 API -->
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=7ji395imrd"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Malgun Gothic', -apple-system, sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background: #f5f5f5; }
        header { background: #111; color: #fff; padding: 15px 20px; text-align: left; font-size: 1.2rem; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10; }
        
        /* 필터 바 스타일 */
        .filter-wrapper { padding: 12px 20px; background: #222; display: flex; flex-direction: column; gap: 8px; z-index: 10; }
        .filter-group { display: flex; align-items: center; gap: 8px; color: #fff; font-size: 0.9rem; }
        .btn-genre, .btn-period { padding: 6px 14px; font-size: 0.85rem; border: none; border-radius: 20px; background: #444; color: #ccc; cursor: pointer; transition: all 0.2s; }
        .btn-genre:hover, .btn-period:hover { background: #555; color: #fff; }
        .btn-genre.active, .btn-period.active { background: #00c73c; color: #fff; font-weight: bold; }

        .container { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* 좌측 영역 (목록 + 페이지네이션) */
        .sidebar { width: 380px; height: 100%; display: flex; flex-direction: column; background: #ffffff; box-shadow: 2px 0 10px rgba(0,0,0,0.05); z-index: 5; }
        #gallery-list { flex: 1; overflow-y: auto; padding: 20px; }
        #map { flex: 1; height: 100%; } 
        
        /* 카드 스타일 */
        .gallery-card { background: #fff; padding: 18px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #e0e0e0; cursor: pointer; transition: all 0.2s ease; }
        .gallery-card:hover { border-color: #00c73c; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        .badge { display: inline-block; padding: 3px 8px; font-size: 0.75rem; color: #fff; background: #00c73c; border-radius: 12px; margin-bottom: 8px; font-weight: normal; }
        .badge.seoul { background: #007bff; }
        .badge.category { background: #6c757d; margin-left: 4px; }
        
        .gallery-name { font-size: 1.1rem; font-weight: bold; color: #222; margin-bottom: 6px; }
        .exhibition-title { font-size: 0.95rem; color: #00c73c; margin-bottom: 8px; font-weight: bold; line-height: 1.4; }
        .exhibition-date { font-size: 0.85rem; color: #666; margin-bottom: 12px; }
        .link-btn { display: inline-block; padding: 6px 12px; font-size: 0.8rem; color: #fff; background: #333; text-decoration: none; border-radius: 4px; transition: 0.2s; }
        .link-btn:hover { background: #00c73c; }

        /* 페이지네이션 스타일 */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 5px; padding: 15px; background: #fff; border-top: 1px solid #eee; }
        .page-btn { padding: 6px 12px; font-size: 0.85rem; border: 1px solid #ddd; background: #fff; color: #333; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        .page-btn:hover { border-color: #00c73c; color: #00c73c; }
        .page-btn.active { background: #00c73c; color: #fff; border-color: #00c73c; font-weight: bold; }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        
        @media (max-width: 768px) {
            .container { flex-direction: column-reverse; }
            .sidebar { width: 100%; height: 50vh; }
            #map { height: 50vh; }
        }
    </style>
</head>
<body>

    <header>🎨 서울 주요 문화행사 및 전시 가이드</header>
    
    <!-- 필터 전체 영역 -->
    <div class="filter-wrapper">
        <!-- 1. 장르 필터 Group -->
        <div class="filter-group">
            <span style="font-weight: bold; margin-right: 8px;">장르:</span>
            <button class="btn-genre active" onclick="setGenre('all', this)">전체</button>
            <button class="btn-genre" onclick="setGenre('art', this)">🎨 미술/전시</button>
            <button class="btn-genre" onclick="setGenre('music', this)">🎵 음악회/연주회</button>
        </div>

        <!-- 2. 기간 필터 Group -->
        <div class="filter-group">
            <span style="font-weight: bold; margin-right: 8px;">기간:</span>
            <button class="btn-period active" onclick="setPeriod('all', this)">전체</button>
            <button class="btn-period" onclick="setPeriod('current', this)">🔥 진행 중</button>
            <button class="btn-period" onclick="setPeriod('upcoming', this)">🗓️ 예정</button>
        </div>
    </div>

    <div class="container">
        <div class="sidebar">
            <div id="gallery-list"></div>
            <div id="pagination" class="pagination"></div>
        </div>
        <div id="map"></div>
    </div>

    <script>
        // 전역 변수
        let rawExhibitionsData = [];
        let currentGenre = 'all';
        let currentPeriod = 'all';
        let filteredData = [];
        let activeMarkers = [];
        let currentPage = 1;
        const itemsPerPage = 10;

        // 주요 랜드마크 시설 목록
        const popularVenues = [
            "국립현대미술관", "MMCA", "예술의전당", "한가람", "서울시립미술관", "SeMA", 
            "리움", "Leeum", "세종문화회관", "국립중앙박물관", "DDP", "동대문디자인플라자",
            "일민미술관", "금호미술관", "아트선재", "성곡미술관", "환기미술관"
        ];

        // 주요 미술관 기초 메타 데이터
        const galleryBaseData = {
            "국립현대미술관 서울": { keywords: ["국립현대", "MMCA"], lat: 37.5786, lng: 126.9801 },
            "서울시립미술관 본관": { keywords: ["서울시립", "SeMA"], lat: 37.5641, lng: 126.9738 },
            "리움미술관": { keywords: ["리움", "Leeum"], lat: 37.5384, lng: 126.9996 },
            "예술의전당 한가람미술관": { keywords: ["예술의전당", "한가람"], lat: 37.4785, lng: 127.0118 },
            "세종문화회관 미술관": { keywords: ["세종문화회관", "세종미술관"], lat: 37.5724, lng: 126.9755 },
            "일민미술관": { keywords: ["일민"], lat: 37.5696, lng: 126.9777 },
            "금호미술관": { keywords: ["금호"], lat: 37.5793, lng: 126.9802 },
            "아트선재센터": { keywords: ["아트선재"], lat: 37.5804, lng: 126.9824 },
            "성곡미술관": { keywords: ["성곡"], lat: 37.5732, lng: 126.9698 },
            "환기미술관": { keywords: ["환기"], lat: 37.5921, lng: 126.9634 }
        };

        // 지도 초기화
        const map = new naver.maps.Map('map', {
            center: new naver.maps.LatLng(37.5665, 126.9780),
            zoom: 12,
            zoomControl: true,
            zoomControlOptions: { position: naver.maps.Position.RIGHT_BOTTOM }
        });

        const listContainer = document.getElementById('gallery-list');
        const paginationContainer = document.getElementById('pagination');

        // 백엔드 API 호출
        async function loadExhibitions() {
            try {
                const response = await fetch('https://museum-culture-guide-1.onrender.com/api/exhibitions');
                const result = await response.json();
                
                if (result.status === 'success') {
                    rawExhibitionsData = result.data;
                    sortDataByPopularity();
                    applyFilters(); 
                }
            } catch (error) {
                console.error('데이터 로드 실패:', error);
            }
        }

        function setGenre(genre, btn) {
            currentGenre = genre;
            document.querySelectorAll('.btn-genre').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            applyFilters();
        }

        function setPeriod(period, btn) {
            currentPeriod = period;
            document.querySelectorAll('.btn-period').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            applyFilters();
        }

        // 통합 필터 적용 함수
        function applyFilters() {
            currentPage = 1; // 필터 적용 시 1페이지로 이동
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            filteredData = rawExhibitionsData.filter(item => {
                // 1. 장르 필터링
                const categoryType = getCategoryType(item);
                let genreMatch = true;
                if (currentGenre === 'art') genreMatch = (categoryType === 'art' || categoryType === 'other');
                if (currentGenre === 'music') genreMatch = (categoryType === 'music');

                // 2. 기간 필터링
                let periodMatch = true;
                const startDateStr = item.STRTDATE || (item.DATE ? item.DATE.split('~')[0] : '');
                const endDateStr = item.END_DATE || (item.DATE ? item.DATE.split('~')[1] : '');

                const startDate = startDateStr ? new Date(startDateStr) : null;
                const endDate = endDateStr ? new Date(endDateStr) : null;

                if (currentPeriod === 'current') {
                    // 진행 중: 시작일 <= 오늘 및 종료일 >= 오늘
                    if (startDate && startDate > today) periodMatch = false;
                    if (endDate && endDate < today) periodMatch = false;
                } else if (currentPeriod === 'upcoming') {
                    // 예정: 시작일 > 오늘
                    if (startDate && startDate <= today) periodMatch = false;
                }

                return genreMatch && periodMatch;
            });

            renderFilteredData();
        }

        function renderFilteredData() {
            if (filteredData.length === 0) {
                listContainer.innerHTML = '<div style="padding:20px; color:#666; text-align:center;">해당 조건의 데이터가 없습니다.</div>';
                paginationContainer.innerHTML = '';
                clearMapMarkers();
                return;
            }

            const startIndex = (currentPage - 1) * itemsPerPage;
            const pageData = filteredData.slice(startIndex, startIndex + itemsPerPage);

            renderPageItems(pageData);
            renderPaginationControls();
        }

        // 인기도 정렬 함수
        function sortDataByPopularity() {
            rawExhibitionsData.sort((a, b) => {
                const titleA = (a.TITLE || a.CODENAME || '');
                const placeA = (a.PLACE || '');
                const titleB = (b.TITLE || b.CODENAME || '');
                const placeB = (b.PLACE || '');

                const scoreA = getPopularityScore(titleA, placeA);
                const scoreB = getPopularityScore(titleB, placeB);

                return scoreB - scoreA;
            });
        }

        function getPopularityScore(title, place) {
            let score = 0;
            popularVenues.forEach((venue, index) => {
                if (place.includes(venue) || title.includes(venue)) {
                    score += (popularVenues.length - index) * 10;
                }
            });
            return score;
        }

        function getCategoryType(item) {
            const title = (item.TITLE || item.CODENAME || '').toLowerCase();
            const place = (item.PLACE || '').toLowerCase();
            const codeName = (item.CODENAME || '').toLowerCase();

            const musicKeywords = ['음악회', '연주회', '콘서트', '오케스트라', '클래식', '독주회', '성악', '국악', '합창'];
            if (musicKeywords.some(kw => title.includes(kw) || codeName.includes(kw))) {
                return 'music';
            }

            const artKeywords = ['전시', '미술', '박물관', '갤러리', '비엔날레', '사진전', '회화', '특별전', '조각', '기획전'];
            if (artKeywords.some(kw => title.includes(kw) || place.includes(kw) || codeName.includes(kw))) {
                return 'art';
            }

            return 'other';
        }

        function renderPageItems(items) {
            clearMapMarkers();
            listContainer.innerHTML = '';
            listContainer.scrollTop = 0;

            items.forEach((item) => {
                const title = item.TITLE || item.CODENAME || '정보 없음';
                const place = item.PLACE || item.GUNAME || '장소 미지정';
                const date = item.DATE || `${item.STRTDATE || ''} ~ ${item.END_DATE || ''}` || '일정 미정';
                const source = item.SOURCE || '서울시문화행사';
                const orgLink = item.ORG_LINK || item.URL || '#';
                const categoryType = getCategoryType(item);
                const categoryLabel = categoryType === 'art' ? '🎨 전시' : categoryType === 'music' ? '🎵 음악회' : '🏛️ 문화';

                let lat = parseFloat(item.LAT || item.X_COORD);
                let lng = parseFloat(item.LOT || item.Y_COORD);

                if (isNaN(lat) || isNaN(lng)) {
                    for (const [gName, gInfo] of Object.entries(galleryBaseData)) {
                        if (gInfo.keywords.some(kw => place.includes(kw) || title.includes(kw))) {
                            lat = gInfo.lat;
                            lng = gInfo.lng;
                            break;
                        }
                    }
                }

                const card = document.createElement('div');
                card.className = 'gallery-card';
                card.innerHTML = `
                    <div>
                        <span class="badge ${source.includes('서울') ? 'seoul' : ''}">${source}</span>
                        <span class="badge category">${categoryLabel}</span>
                    </div>
                    <div class="gallery-name">📍 ${place}</div>
                    <div class="exhibition-title">✨ ${title}</div>
                    <div class="exhibition-date">📅 ${date}</div>
                    ${orgLink !== '#' ? `<a href="${orgLink}" target="_blank" class="link-btn" onclick="event.stopPropagation();">🔗 상세 정보 보기</a>` : ''}
                `;

                if (!isNaN(lat) && !isNaN(lng)) {
                    const position = new naver.maps.LatLng(lat, lng);
                    const marker = new naver.maps.Marker({
                        position: position,
                        map: map,
                        title: title
                    });

                    activeMarkers.push(marker);

                    const infoWindow = new naver.maps.InfoWindow({
                        content: `<div style="padding:12px; min-width:200px; font-size:13px; line-height:1.4;">
                                    <strong style="font-size:14px; color:#111;">${place}</strong><br/>
                                    <span style="color:#00c73c; font-weight:bold; display:inline-block; margin:4px 0;">${title}</span><br/>
                                    <span style="color:#666; font-size:11px;">📅 ${date}</span>
                                  </div>`,
                        borderWidth: 1, borderColor: "#00c73c"
                    });

                    naver.maps.Event.addListener(marker, 'click', function() {
                        if (infoWindow.getMap()) {
                            infoWindow.close();
                        } else {
                            infoWindow.open(map, marker);
                            map.panTo(position);
                        }
                    });

                    card.addEventListener('click', () => {
                        map.panTo(position);
                        map.setZoom(14);
                        infoWindow.open(map, marker);
                    });
                }

                listContainer.appendChild(card);
            });
        }

        function renderPaginationControls() {
            paginationContainer.innerHTML = '';
            const totalPages = Math.ceil(filteredData.length / itemsPerPage);

            if (totalPages <= 1) return;

            const prevBtn = document.createElement('button');
            prevBtn.className = 'page-btn';
            prevBtn.innerText = '이전';
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderFilteredData();
                }
            };
            paginationContainer.appendChild(prevBtn);

            const maxVisiblePages = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
            let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);

            if (endPage - startPage + 1 < maxVisiblePages) {
                startPage = Math.max(1, endPage - maxVisiblePages + 1);
            }

            for (let i = startPage; i <= endPage; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                pageBtn.innerText = i;
                pageBtn.onclick = () => {
                    currentPage = i;
                    renderFilteredData();
                };
                paginationContainer.appendChild(pageBtn);
            }

            const nextBtn = document.createElement('button');
            nextBtn.className = 'page-btn';
            nextBtn.innerText = '다음';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    renderFilteredData();
                }
            };
            paginationContainer.appendChild(nextBtn);
        }

        function clearMapMarkers() {
            activeMarkers.forEach(marker => marker.setMap(null));
            activeMarkers = [];
        }

        window.onload = loadExhibitions;
    </script>
</body>
</html>
